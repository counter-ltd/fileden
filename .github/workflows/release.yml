name: Build & Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Toolchain
        run: swift --version

      - name: Install optipng + pngquant
        run: brew install optipng pngquant

      - name: Build app bundle
        run: make bundle

      - name: Zip app
        run: ditto -c -k --keepParent build/FileDen.app build/FileDen.app.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: FileDen
          path: build/FileDen.app.zip

      # Versioned release when a v* tag is pushed.
      - name: Tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/FileDen.app.zip
          generate_release_notes: true

      # Rolling "latest" prerelease — refreshed on every push to main.
      - name: Rolling release
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --cleanup-tag --yes || true
          gh release create latest build/FileDen.app.zip \
            --title "Latest build" \
            --notes "Automated build from ${{ github.sha }}" \
            --prerelease
